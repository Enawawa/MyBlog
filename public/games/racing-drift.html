<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极速漂移 - 3D Racing Drift</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #score { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(255,100,0,0.6); z-index: 10; }
        #speed-display { position: absolute; bottom: 40px; right: 40px; font-size: 36px; font-weight: bold; color: #ff6600; z-index: 10; text-shadow: 0 0 15px rgba(255,100,0,0.5); }
        #best { position: absolute; top: 10px; right: 20px; font-size: 16px; color: rgba(255,255,255,0.5); z-index: 10; }
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 80px; z-index: 10; pointer-events: all; }
        .ctrl-btn { width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: #fff; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .ctrl-btn:active { background: rgba(255,255,255,0.2); border-color: #ff6600; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); pointer-events: all; z-index: 20; }
        .overlay h1 { font-size: 48px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 40px rgba(255,100,0,0.5); }
        .overlay h2 { font-size: 26px; color: #ff6600; margin-bottom: 30px; }
        .overlay p { font-size: 18px; color: #aaa; margin-bottom: 20px; text-align: center; }
        .btn { background: linear-gradient(135deg, #ff6600, #ff2200); color: #fff; border: none; padding: 16px 48px; font-size: 22px; border-radius: 50px; cursor: pointer; pointer-events: all; box-shadow: 0 8px 30px rgba(255,100,0,0.4); transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .back-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.12); color: #fff; border: none; padding: 10px 20px; font-size: 16px; border-radius: 25px; cursor: pointer; pointer-events: all; z-index: 30; backdrop-filter: blur(10px); }
        .back-btn:hover { background: rgba(255,255,255,0.22); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="ui">
        <a class="back-btn" href="/">← 返回博客</a>
        <div id="score">0</div>
        <div id="speed-display">0 km/h</div>
        <div id="best">最高: 0</div>
        <div class="controls hidden" id="mobile-controls">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
        </div>
        <div id="start-screen" class="overlay">
            <h1>🏎️ 极速漂移</h1>
            <h2>3D Racing Drift</h2>
            <p>← → 方向键或点击两侧按钮控制方向<br>躲避障碍，疾速前进！</p>
            <button class="btn" id="startBtn">极速启动</button>
        </div>
        <div id="game-over" class="overlay hidden">
            <h1>撞车了！</h1>
            <h2 id="final-score">距离: 0</h2>
            <p id="new-record" class="hidden" style="color:#ffd700;font-size:24px;">🎉 新纪录！</p>
            <button class="btn" id="restartBtn">重新出发</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        let scene, camera, renderer;
        let car, carGroup;
        let roadSegments = [], obstaclePool = [], collectibles = [];
        let gameStarted = false, isGameOver = false;
        let score = 0, bestScore = parseInt(localStorage.getItem('racing-best') || '0');
        let carLane = 0, targetLane = 0;
        let speed = 0.3, maxSpeed = 0.6, acceleration = 0.0003;
        let moveLeft = false, moveRight = false;
        const laneWidth = 2.5;
        const lanes = [-laneWidth, 0, laneWidth];

        document.getElementById('best').textContent = '最高: ' + bestScore;
        if ('ontouchstart' in window) document.getElementById('mobile-controls').classList.remove('hidden');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 20, 80);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 0, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.body.insertBefore(renderer.domElement, document.getElementById('ui'));

            scene.add(new THREE.AmbientLight(0x222244, 0.4));

            const headlight = new THREE.SpotLight(0xffffff, 2, 40, Math.PI / 5, 0.5);
            headlight.position.set(0, 3, 5);
            headlight.target.position.set(0, 0, -20);
            scene.add(headlight);
            scene.add(headlight.target);

            const neonLeft = new THREE.PointLight(0xff0066, 1, 20);
            neonLeft.position.set(-6, 2, -5);
            scene.add(neonLeft);

            const neonRight = new THREE.PointLight(0x00ffcc, 1, 20);
            neonRight.position.set(6, 2, -5);
            scene.add(neonRight);

            createCar();
            createRoad();
            createCityscape();

            window.addEventListener('resize', onResize);
        }

        function createCar() {
            carGroup = new THREE.Group();

            const bodyGeo = new THREE.BoxGeometry(1.4, 0.4, 2.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff2200, metalness: 0.9, roughness: 0.1 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            carGroup.add(body);

            const topGeo = new THREE.BoxGeometry(1.1, 0.35, 1.4);
            const topMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5, roughness: 0.3, transparent: true, opacity: 0.8 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(0, 0.85, -0.2);
            carGroup.add(top);

            const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 12);
            wheelGeo.rotateZ(Math.PI / 2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.4, roughness: 0.8 });
            [[-0.7, 0.2, 0.8], [0.7, 0.2, 0.8], [-0.7, 0.2, -0.8], [0.7, 0.2, -0.8]].forEach(p => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.position.set(...p);
                carGroup.add(w);
            });

            const tailLeft = new THREE.PointLight(0xff0000, 0.5, 5);
            tailLeft.position.set(-0.5, 0.5, 1.4);
            carGroup.add(tailLeft);
            const tailRight = new THREE.PointLight(0xff0000, 0.5, 5);
            tailRight.position.set(0.5, 0.5, 1.4);
            carGroup.add(tailRight);

            carGroup.position.set(0, 0, 3);
            scene.add(carGroup);
            car = carGroup;
        }

        function createRoad() {
            for (let i = 0; i < 20; i++) {
                const roadGeo = new THREE.PlaneGeometry(9, 10);
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 });
                const road = new THREE.Mesh(roadGeo, roadMat);
                road.rotation.x = -Math.PI / 2;
                road.position.set(0, 0, -i * 10 + 10);
                road.receiveShadow = true;
                scene.add(road);
                roadSegments.push(road);

                for (let j = -1; j <= 1; j += 2) {
                    const lineGeo = new THREE.PlaneGeometry(0.08, 4);
                    const lineMat = new THREE.MeshBasicMaterial({ color: 0x444466 });
                    const line = new THREE.Mesh(lineGeo, lineMat);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(laneWidth * j / 2 + laneWidth / 4 * j, 0.01, -i * 10 + 10 - 2.5);
                    scene.add(line);
                }

                for (let j = -1; j <= 1; j += 2) {
                    const edgeGeo = new THREE.BoxGeometry(0.15, 0.3, 10);
                    const edgeMat = new THREE.MeshStandardMaterial({
                        color: j === -1 ? 0xff0066 : 0x00ffcc,
                        emissive: j === -1 ? 0xff0066 : 0x00ffcc,
                        emissiveIntensity: 0.3
                    });
                    const edge = new THREE.Mesh(edgeGeo, edgeMat);
                    edge.position.set(4.5 * j, 0.15, -i * 10 + 10);
                    scene.add(edge);
                }
            }
        }

        function createCityscape() {
            for (let i = 0; i < 40; i++) {
                const side = i % 2 === 0 ? -1 : 1;
                const h = 3 + Math.random() * 12;
                const w = 1.5 + Math.random() * 3;
                const geo = new THREE.BoxGeometry(w, h, w);
                const hue = Math.random() * 0.15 + (side === -1 ? 0.8 : 0.5);
                const mat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(hue, 0.3, 0.15),
                    emissive: new THREE.Color().setHSL(hue, 0.8, 0.1),
                    emissiveIntensity: 0.2
                });
                const bldg = new THREE.Mesh(geo, mat);
                bldg.position.set(side * (7 + Math.random() * 6), h / 2, -i * 8 + Math.random() * 4);
                scene.add(bldg);

                const wCount = Math.floor(h / 1.5);
                for (let wi = 0; wi < wCount; wi++) {
                    if (Math.random() > 0.5) {
                        const wGeo = new THREE.PlaneGeometry(0.3, 0.4);
                        const wMat = new THREE.MeshBasicMaterial({
                            color: new THREE.Color().setHSL(Math.random() * 0.15 + 0.1, 0.8, 0.7),
                            transparent: true, opacity: 0.8
                        });
                        const win = new THREE.Mesh(wGeo, wMat);
                        win.position.set(bldg.position.x - side * w / 2 * 0.99, wi * 1.5 + 1, bldg.position.z);
                        win.rotation.y = side === -1 ? Math.PI / 2 : -Math.PI / 2;
                        scene.add(win);
                    }
                }
            }
        }

        function spawnObstacle(z) {
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() > 0.4 ? 'barrier' : 'car';
            let mesh;

            if (type === 'barrier') {
                const geo = new THREE.BoxGeometry(1.6, 1.2, 0.6);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0xff4400,
                    emissive: 0xff2200, emissiveIntensity: 0.2,
                    metalness: 0.5, roughness: 0.5
                });
                mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(lanes[lane], 0.6, z);
            } else {
                const group = new THREE.Group();
                const bGeo = new THREE.BoxGeometry(1.2, 0.5, 2.4);
                const bMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 0.7, 0.4),
                    metalness: 0.8, roughness: 0.2
                });
                const b = new THREE.Mesh(bGeo, bMat);
                b.position.y = 0.5;
                group.add(b);
                const tGeo = new THREE.BoxGeometry(0.9, 0.4, 1.2);
                const tMat = new THREE.MeshStandardMaterial({ color: 0x111111, transparent: true, opacity: 0.7 });
                const t = new THREE.Mesh(tGeo, tMat);
                t.position.set(0, 0.9, -0.2);
                group.add(t);
                group.position.set(lanes[lane], 0, z);
                mesh = group;
            }

            mesh.castShadow = true;
            scene.add(mesh);
            obstaclePool.push({ mesh, lane, type });
        }

        function spawnCollectible(z) {
            const lane = Math.floor(Math.random() * 3);
            const geo = new THREE.OctahedronGeometry(0.3);
            const mat = new THREE.MeshStandardMaterial({
                color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.4,
                metalness: 0.9, roughness: 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(lanes[lane], 1.2, z);
            scene.add(mesh);
            collectibles.push({ mesh, lane, collected: false });
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameStarted = true;
            isGameOver = false;
            score = 0;
            speed = 0.3;
            targetLane = 1;
            carLane = 1;
            car.position.x = lanes[1];
            document.getElementById('score').textContent = '0';

            obstaclePool.forEach(o => scene.remove(o.mesh));
            collectibles.forEach(c => scene.remove(c.mesh));
            obstaclePool = [];
            collectibles = [];

            for (let i = 0; i < 8; i++) {
                spawnObstacle(-20 - i * 12);
                if (Math.random() > 0.5) spawnCollectible(-15 - i * 12);
            }
        }

        function endGame() {
            isGameOver = true;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('racing-best', bestScore.toString());
                document.getElementById('best').textContent = '最高: ' + bestScore;
                document.getElementById('new-record').classList.remove('hidden');
            } else {
                document.getElementById('new-record').classList.add('hidden');
            }
            document.getElementById('final-score').textContent = '距离: ' + score;
            setTimeout(() => document.getElementById('game-over').classList.remove('hidden'), 500);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameStarted && !isGameOver) {
                speed = Math.min(speed + acceleration, maxSpeed);
                score += Math.floor(speed * 10);
                document.getElementById('score').textContent = score;
                document.getElementById('speed-display').textContent = Math.floor(speed * 400) + ' km/h';

                const targetX = lanes[targetLane];
                car.position.x += (targetX - car.position.x) * 0.12;
                car.rotation.y = (targetX - car.position.x) * 0.15;
                car.rotation.z = -(targetX - car.position.x) * 0.05;

                for (const obs of obstaclePool) {
                    obs.mesh.position.z += speed;
                    if (obs.mesh.position.z > 12) {
                        obs.mesh.position.z -= 100;
                        obs.lane = Math.floor(Math.random() * 3);
                        obs.mesh.position.x = lanes[obs.lane];
                    }

                    const dz = Math.abs(obs.mesh.position.z - car.position.z);
                    const dx = Math.abs(obs.mesh.position.x - car.position.x);
                    if (dz < 1.5 && dx < 1.0) {
                        endGame();
                        return;
                    }
                }

                for (const col of collectibles) {
                    col.mesh.position.z += speed;
                    col.mesh.rotation.y += 0.05;
                    col.mesh.rotation.x += 0.03;

                    if (!col.collected) {
                        const dz = Math.abs(col.mesh.position.z - car.position.z);
                        const dx = Math.abs(col.mesh.position.x - car.position.x);
                        if (dz < 1.5 && dx < 1.2) {
                            col.collected = true;
                            col.mesh.visible = false;
                            score += 500;
                        }
                    }

                    if (col.mesh.position.z > 12) {
                        col.mesh.position.z -= 100;
                        col.mesh.position.x = lanes[Math.floor(Math.random() * 3)];
                        col.collected = false;
                        col.mesh.visible = true;
                    }
                }

                roadSegments.forEach(r => {
                    r.position.z += speed;
                    if (r.position.z > 15) r.position.z -= 200;
                });
            }

            if (!gameStarted && car) {
                car.position.y = Math.sin(Date.now() * 0.002) * 0.1;
            }

            renderer.render(scene, camera);
        }

        function switchLane(dir) {
            if (!gameStarted || isGameOver) return;
            targetLane = Math.max(0, Math.min(2, targetLane + dir));
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        animate();

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', () => { document.getElementById('game-over').classList.add('hidden'); startGame(); });
        document.getElementById('leftBtn')?.addEventListener('touchstart', (e) => { e.preventDefault(); switchLane(-1); });
        document.getElementById('rightBtn')?.addEventListener('touchstart', (e) => { e.preventDefault(); switchLane(1); });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') switchLane(-1);
            else if (e.code === 'ArrowRight' || e.code === 'KeyD') switchLane(1);
            else if (e.code === 'Space') {
                e.preventDefault();
                if (!gameStarted) startGame();
                else if (isGameOver) { document.getElementById('game-over').classList.add('hidden'); startGame(); }
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 30) switchLane(dx > 0 ? 1 : -1);
        });
    })();
    </script>
</body>
</html>
